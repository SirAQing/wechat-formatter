<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公众号排版转换器</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 24px;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f7f7f5;
    color: #2c2c2a;
  }
  .wrap { max-width: 1100px; margin: 0 auto; }
  h1 { font-size: 18px; font-weight: 600; margin: 0 0 4px; }
  .sub { font-size: 13px; color: #888780; margin: 0 0 18px; }
  .themes { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
  .theme-btn {
    font-size: 13px; padding: 6px 14px; border-radius: 6px;
    border: 1px solid #d3d1c7; background: #fff; cursor: pointer;
    color: #2c2c2a; transition: all .15s;
  }
  .theme-btn.active { border-width: 2px; font-weight: 600; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }
  .col-label {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: #888780; margin-bottom: 6px;
  }
  textarea {
    width: 100%; height: 460px; box-sizing: border-box;
    border: 1px solid #d3d1c7; border-radius: 8px; padding: 14px;
    font-family: "SF Mono", Consolas, Monaco, monospace; font-size: 13px;
    line-height: 1.7; resize: vertical; background: #fff; color: #2c2c2a;
  }
  textarea:focus { outline: none; border-color: #888780; }
  .preview-box {
    border: 1px solid #d3d1c7; border-radius: 8px; height: 460px;
    overflow-y: auto; background: #fff;
  }
  #preview { padding: 22px; }
  .copy-btn {
    display: flex; align-items: center; gap: 6px; font-size: 13px;
    padding: 6px 14px; border-radius: 6px; border: 1px solid #2c2c2a;
    background: #2c2c2a; color: #fff; cursor: pointer; font-weight: 500;
  }
  .copy-btn:hover { background: #444441; }
  .copy-btn:active { transform: scale(0.97); }
  #toast {
    display: none; margin-top: 12px; font-size: 13px; padding: 10px 14px;
    border-radius: 8px;
  }
  .toast-ok { background: #eaf3de; color: #27500a; }
  .toast-err { background: #fcebeb; color: #791f1f; }
  .notes {
    margin-top: 20px; padding: 14px 18px; background: #eeede8;
    border-radius: 8px; font-size: 13px; color: #5f5e5a; line-height: 1.8;
  }
  .notes b { color: #2c2c2a; }
</style>
</head>
<body>
<div class="wrap">
  <h1>公众号排版转换器</h1>
  <p class="sub">左侧写 Markdown，右侧是实时预览 —— 预览区域就是真正会被复制走的内容，所见即所得。</p>

  <div class="themes" id="theme-bar"></div>

  <div class="grid">
    <div>
      <div class="col-label"><span>Markdown 输入</span></div>
      <textarea id="md-input" oninput="render()"></textarea>
    </div>
    <div>
      <div class="col-label">
        <span>预览（会被复制的内容）</span>
        <button class="copy-btn" onclick="copyToClipboard()">复制到公众号</button>
      </div>
      <div class="preview-box"><div id="preview"></div></div>
    </div>
  </div>

  <div id="toast"></div>

  <div class="notes">
    <b>已知限制：</b>图片需要先在公众号编辑器里单独上传到素材库（外链图片大概率会被拦截）；普通超链接会保留颜色样式但点击无法跳转（这是微信平台本身的限制，不是工具的问题）；表格、数学公式等复杂结构暂未支持，遇到这类内容建议仍用秀米 / 135编辑器 / mdnice。
  </div>
</div>

<script>
const themes = {
  warm: {
    label: '暖陶色',
    // 色彩
    accent: '#C96B3D', heading: '#C96B3D', bold: '#C96B3D', text: '#333333',
    hr: '#e5ded4', quoteBg: '#FFF8EC', quoteText: '#555555',
    codeBg: '#f0eeea', codeText: '#b3401f',
    // 页面布局
    pageBg: '#F5F5F5', contentBg: '#FAF8F6',
    fontFamily: 'PingFang SC, Microsoft YaHei, sans-serif',
    lineHeight: '2.0', padding: '36px 24px', borderRadius: '8px',
    // 标题系统
    h1Size: '34px', h1Weight: '700', h1Margin: '40px 0 24px',
    h2Size: '28px', h2Weight: '700', h2Color: '#333333', h2Margin: '36px 0 16px',
    h3Size: '22px', h3Weight: '600', h3Color: '#444444', h3Margin: '28px 0 12px',
    // 正文
    bodySize: '17px', bodyLetterSpacing: '0.3px',
    // 引用块
    quoteBorder: '4px', quotePadding: '16px 20px', quoteBorderRadius: '6px', quoteSize: '16px',
    // Mac Terminal 代码块
    codeBlockStyle: 'terminal',
    terminalBg: '#1E1E1E', terminalBarBg: '#2A2A2A', terminalText: '#E6EDF3',
    codeFont: 'Menlo, Monaco, SFMono-Regular, Consolas, monospace',
    codeBlockFontSize: '14px', codeBlockLineHeight: '2.0',
  }
};
let currentTheme = 'warm';

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function inlineFormat(text, theme) {
  text = escapeHtml(text);
  text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (m, alt, url) =>
    `<img src="${url}" alt="${alt}" style="max-width:100%;display:block;margin:16px auto;border-radius:4px;">`);
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (m, t) =>
    `<span style="color:${theme.accent};text-decoration:underline;">${t}</span>`);
  text = text.replace(/\*\*([^*]+)\*\*/g, (m, t) =>
    `<strong style="font-weight:bold;color:${theme.bold};">${t}</strong>`);
  text = text.replace(/\*([^*]+)\*/g, (m, t) =>
    `<em style="font-style:italic;">${t}</em>`);
  text = text.replace(/`([^`]+)`/g, (m, t) =>
    `<code style="background:${theme.codeBg};color:${theme.codeText};padding:2px 6px;border-radius:3px;font-family:${theme.codeFont || 'Consolas,Monaco,monospace'};font-size:14px;">${t}</code>`);
  return text;
}

function mdToHtml(md, theme) {
  const lines = md.split('\n');
  let html = '';
  let i = 0;
  let listBuffer = [];
  let listType = null;

  function flushList() {
    if (listBuffer.length) {
      html += listBuffer.join('');
      listBuffer = [];
      listType = null;
    }
  }

  while (i < lines.length) {
    const line = lines[i];

    if (line.trim() === '') { flushList(); i++; continue; }

    if (line.trim().startsWith('```')) {
      flushList();
      const codeLines = [];
      i++;
      while (i < lines.length && !lines[i].trim().startsWith('```')) { codeLines.push(lines[i]); i++; }
      i++;
      const codeText = escapeHtml(codeLines.join('\n'));
      if (theme.codeBlockStyle === 'terminal') {
        // 公众号兼容方案：table 替代 div/pre，box-shadow→border，overflow 删除，\n→<br>
        html += `<table style="width:100%;background:${theme.terminalBg};border-radius:12px;border:1px solid #333;margin:24px 0;">
          <tr>
            <td style="padding:10px 16px;background:${theme.terminalBarBg};">
              <span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#FF5F57;margin-right:8px;"></span>
              <span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#FEBC2E;margin-right:8px;"></span>
              <span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#28C840;"></span>
            </td>
          </tr>
          <tr>
            <td style="padding:20px;color:${theme.terminalText};font-family:${theme.codeFont || 'Consolas,Monaco,monospace'};line-height:${theme.codeBlockLineHeight || '2.0'};font-size:${theme.codeBlockFontSize || '14px'};">
              ${codeText.replace(/\n/g,'<br>')}
            </td>
          </tr>
        </table>`;
      } else {
        html += `<table style="width:100%;background:${theme.codeBlockBg};border-radius:6px;margin:16px 0;">
          <tr>
            <td style="padding:16px;color:${theme.codeBlockText};font-family:${theme.codeFont || 'Consolas,Monaco,monospace'};font-size:13px;line-height:1.6;">
              ${codeText.replace(/\n/g,'<br>')}
            </td>
          </tr>
        </table>`;
      }
      continue;
    }

    const headingMatch = line.match(/^(#{1,3})\s+(.*)$/);
    if (headingMatch) {
      flushList();
      const level = headingMatch[1].length;
      const sizeMap  = { 1: theme.h1Size || '22px', 2: theme.h2Size || '19px', 3: theme.h3Size || '17px' };
      const weightMap = { 1: theme.h1Weight || 'bold', 2: theme.h2Weight || 'bold', 3: theme.h3Weight || 'bold' };
      const colorMap  = { 1: theme.heading, 2: theme.h2Color || theme.heading, 3: theme.h3Color || theme.heading };
      const marginMap = { 1: theme.h1Margin || '28px 0 18px', 2: theme.h2Margin || '24px 0 12px', 3: theme.h3Margin || '24px 0 12px' };
      const align = level === 1 ? 'center' : 'left';
      html += `<h${level} style="font-size:${sizeMap[level]};font-weight:${weightMap[level]};color:${colorMap[level]};text-align:${align};margin:${marginMap[level]};line-height:1.4;">${inlineFormat(headingMatch[2], theme)}</h${level}>`;
      i++;
      continue;
    }

    if (/^(-{3,}|\*{3,})$/.test(line.trim())) {
      flushList();
      html += `<hr style="border:none;border-top:1px solid ${theme.hr};margin:28px 0;">`;
      i++;
      continue;
    }

    if (line.trim().startsWith('>')) {
      flushList();
      const quoteLines = [];
      while (i < lines.length && lines[i].trim().startsWith('>')) {
        quoteLines.push(lines[i].trim().replace(/^>\s?/, ''));
        i++;
      }
      html += `<blockquote style="border-left:${theme.quoteBorder || '3px'} solid ${theme.accent};background:${theme.quoteBg};color:${theme.quoteText};padding:${theme.quotePadding || '12px 18px'};margin:20px 0;border-radius:${theme.quoteBorderRadius || '0 4px 4px 0'};font-size:${theme.quoteSize || '15px'};line-height:${theme.lineHeight || '1.8'};${theme.bodyLetterSpacing ? `letter-spacing:${theme.bodyLetterSpacing}` : ''}">${quoteLines.map(l => inlineFormat(l, theme)).join('<br>')}</blockquote>`;
      continue;
    }

    const ulMatch = line.match(/^[-*]\s+(.*)$/);
    if (ulMatch) {
      if (listType !== 'ul') flushList();
      listType = 'ul';
      listBuffer.push(`<p style="margin:10px 0;line-height:${theme.lineHeight || '1.8'};font-size:${theme.bodySize || '16px'};color:${theme.text};"><span style="color:${theme.accent};margin-right:8px;">\u25cf</span><span>${inlineFormat(ulMatch[1], theme)}</span></p>`);
      i++;
      continue;
    }

    const olMatch = line.match(/^(\d+)\.\s+(.*)$/);
    if (olMatch) {
      if (listType !== 'ol') flushList();
      listType = 'ol';
      listBuffer.push(`<p style="margin:10px 0;line-height:${theme.lineHeight || '1.8'};font-size:${theme.bodySize || '16px'};color:${theme.text};"><span style="color:${theme.accent};font-weight:bold;margin-right:8px;">${olMatch[1]}.</span><span>${inlineFormat(olMatch[2], theme)}</span></p>`);
      i++;
      continue;
    }

    const imgMatch = line.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);
    if (imgMatch) {
      flushList();
      html += `<p style="margin:16px 0;text-align:center;"><img src="${imgMatch[2]}" alt="${imgMatch[1]}" style="max-width:100%;border-radius:4px;"></p>`;
      i++;
      continue;
    }

    flushList();
    const paraLines = [line];
    i++;
    while (
      i < lines.length && lines[i].trim() !== '' &&
      !/^#{1,3}\s/.test(lines[i]) && !/^[-*]\s/.test(lines[i]) &&
      !/^\d+\.\s/.test(lines[i]) && !lines[i].trim().startsWith('>') &&
      !lines[i].trim().startsWith('```') && !/^(-{3,}|\*{3,})$/.test(lines[i].trim())
    ) { paraLines.push(lines[i]); i++; }
    html += `<p style="margin:16px 0;line-height:${theme.lineHeight || '1.8'};font-size:${theme.bodySize || '16px'};color:${theme.text};${theme.bodyLetterSpacing ? `letter-spacing:${theme.bodyLetterSpacing}` : ''}">${paraLines.map(l => inlineFormat(l, theme)).join(' ')}</p>`;
  }
  flushList();
  return html;
}

function render() {
  const md = document.getElementById('md-input').value;
  const theme = themes[currentTheme];
  const bodyHtml = mdToHtml(md, theme);

  document.body.style.background = theme.pageBg || '#f7f7f5';

  const previewEl = document.getElementById('preview');
  const previewBox = previewEl.parentElement;

  if (theme.contentBg || theme.fontFamily || theme.padding) {
    const card = [
      theme.contentBg   ? `background:${theme.contentBg}` : '',
      theme.fontFamily  ? `font-family:${theme.fontFamily}` : '',
      theme.padding     ? `padding:${theme.padding}` : '',
      theme.borderRadius ? `border-radius:${theme.borderRadius}` : '',
    ].filter(Boolean).join(';');

    previewEl.style.padding = '0';
    previewEl.style.background = theme.pageBg || 'transparent';
    previewBox.style.background = theme.pageBg || '#fff';

    // section 兼容公众号，不用 div；不包外层 pageBg（公众号无法保留页面级背景）
    previewEl.innerHTML = `<section style="${card}">${bodyHtml}</section>`;
  } else {
    previewBox.style.background = '#fff';
    previewEl.style.background = 'transparent';
    previewEl.style.padding = '22px';
    previewEl.innerHTML = bodyHtml;
  }
}

function buildThemeBar() {
  const bar = document.getElementById('theme-bar');
  Object.keys(themes).forEach(key => {
    const btn = document.createElement('button');
    btn.className = 'theme-btn' + (key === currentTheme ? ' active' : '');
    btn.id = 'theme-' + key;
    btn.textContent = themes[key].label;
    btn.style.borderColor = themes[key].accent;
    btn.style.color = key === currentTheme ? themes[key].accent : '#2c2c2a';
    btn.onclick = () => setTheme(key);
    bar.appendChild(btn);
  });
}

function setTheme(name) {
  currentTheme = name;
  Object.keys(themes).forEach(key => {
    const btn = document.getElementById('theme-' + key);
    btn.classList.toggle('active', key === name);
    btn.style.color = key === name ? themes[key].accent : '#2c2c2a';
  });
  render();
}

async function copyToClipboard() {
  const previewEl = document.getElementById('preview');
  let success = false;

  // 优先 execCommand：复制富文本 DOM，公众号识别率远高于 ClipboardItem（后者复制 HTML 源码会被微信重新解析过滤）
  try {
    const range = document.createRange();
    range.selectNodeContents(previewEl);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    success = document.execCommand('copy');
    sel.removeAllRanges();
  } catch (e) { success = false; }

  // 降级：ClipboardItem API
  if (!success) {
    try {
      if (navigator.clipboard && window.ClipboardItem) {
        const htmlContent = previewEl.innerHTML;
        const textContent = previewEl.innerText;
        const item = new ClipboardItem({
          'text/html': new Blob([htmlContent], { type: 'text/html' }),
          'text/plain': new Blob([textContent], { type: 'text/plain' })
        });
        await navigator.clipboard.write([item]);
        success = true;
      }
    } catch (e) { success = false; }
  }

  const toast = document.getElementById('toast');
  toast.style.display = 'block';
  toast.className = success ? 'toast-ok' : 'toast-err';
  toast.textContent = success
    ? '已复制富文本，可直接粘贴到公众号草稿箱'
    : '自动复制失败，请手动选中右侧预览区域后按 Ctrl+C / Cmd+C';
  setTimeout(() => { toast.style.display = 'none'; }, 3000);
}

document.getElementById('md-input').value =
`# 我为什么非得把整本书重写

四月那本，基于的是 Hermes v0.7.0。现在它已经到 v0.16.0 了。

这两个月它长出来的东西，我列一下你感受：

- 原生桌面 App、浏览器管理面板
- 简体中文支持、23 个消息平台接入
- 一群 Agent 协同干活的多 Agent 看板
- 一套认真写过的安全模型

官方自己把这一版命名为 **「The Surface Release」**，意思就是让你在任何地方都摸得到它。

> GitHub 简介从过去的「self-improving」换成了「The agent that grows with you」。

一个会自己改自己的 Agent，边界到底在哪，谁来看着它？`;

buildThemeBar();
render();
</script>
</body>
</html>
