<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公众号排版助手</title>
<style>
  * { box-sizing: border-box; }
  body {
    width: 680px; min-height: 500px;
    margin: 0; padding: 16px;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #F5F5F5; color: #2c2c2a;
  }
  .head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .head h1 { font-size: 15px; font-weight: 600; margin: 0; color: #C96B3D; }
  .sync-btn {
    display: flex; align-items: center; gap: 5px; font-size: 12px;
    padding: 5px 12px; border-radius: 5px;
    border: 1px solid #C96B3D; background: #C96B3D; color: #fff;
    cursor: pointer; font-weight: 600; white-space: nowrap;
  }
  .sync-btn:hover { background: #b85a30; }
  .sync-btn:active { transform: scale(0.97); }
  .sync-btn:disabled { opacity: .5; cursor: not-allowed; }

  textarea {
    width: 100%; height: 180px; box-sizing: border-box;
    border: 1px solid #d3d1c7; border-radius: 8px; padding: 12px;
    font-family: "SF Mono", Consolas, Monaco, monospace; font-size: 13px;
    line-height: 1.7; resize: vertical; background: #fff; color: #2c2c2a;
    margin-bottom: 10px;
  }
  textarea:focus { outline: none; border-color: #C96B3D; }

  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 8px; }
  .toolbar-left { display: flex; gap: 4px; align-items: center; }
  .theme-tag { font-size: 11px; color: #888; padding: 3px 8px; background: #f0eeea; border-radius: 4px; cursor: pointer; border: 1px solid transparent; }
  .theme-tag.active { border-color: #C96B3D; color: #C96B3D; background: #FFF8EC; font-weight: 600; }

  .preview-label { font-size: 11px; color: #888; margin-bottom: 4px; display: flex; justify-content: space-between; }
  .preview-box {
    border: 1px solid #d3d1c7; border-radius: 8px;
    max-height: 260px; overflow-y: auto; background: #FAF8F6;
  }
  #preview { padding: 24px; }

  #toast {
    display: none; margin-top: 10px; font-size: 12px; padding: 8px 12px;
    border-radius: 6px; text-align: center;
  }
  .toast-ok { background: #eaf3de; color: #27500a; }
  .toast-err { background: #fcebeb; color: #791f1f; }
  .toast-info { background: #eef5fb; color: #0c447c; }

  .tip {
    margin-top: 8px; font-size: 11px; color: #aaa; text-align: center;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="head">
  <h1>公众号排版助手</h1>
  <button class="sync-btn" id="sync-btn">
    ⚡ 一键同步到公众号
  </button>
</div>

<textarea id="md-input" placeholder="在此粘贴或编写 Markdown..."></textarea>

<div class="toolbar">
  <div class="toolbar-left" id="theme-bar"></div>
  <button class="sync-btn" id="copy-btn" style="background:#fff;color:#C96B3D;">复制</button>
</div>

<div class="preview-label"><span>预览（同步 / 复制的内容）</span></div>
<div class="preview-box"><div id="preview"></div></div>

<div id="toast"></div>
<div class="tip">在公众号图文编辑页面打开此插件，点击「一键同步」即可直注编辑器</div>

<script src="popup.js"></script>
</body>
</html>
